<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" role="img" aria-label="Dark Earth at night with glowing city lights">
  <defs>
    <radialGradient id="nightSurface" cx="62%" cy="28%" r="82%">
      <stop offset="0%" stop-color="#6d4631"/>
      <stop offset="24%" stop-color="#201817"/>
      <stop offset="58%" stop-color="#07090d"/>
      <stop offset="100%" stop-color="#010205"/>
    </radialGradient>
    <radialGradient id="nightTerminator" cx="82%" cy="26%" r="72%">
      <stop offset="0%" stop-color="#ffe0c7" stop-opacity=".45"/>
      <stop offset="13%" stop-color="#c67842" stop-opacity=".22"/>
      <stop offset="42%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity=".68"/>
    </radialGradient>
    <radialGradient id="nightAtmosphere" cx="70%" cy="28%" r="56%">
      <stop offset="78%" stop-color="#f59b5f" stop-opacity="0"/>
      <stop offset="92%" stop-color="#f9c29d" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#fff1dc" stop-opacity=".8"/>
    </radialGradient>
    <filter id="lightBloom" x="0" y="0" width="400" height="400" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.25" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="fineGrain" x="0" y="0" width="400" height="400">
      <feTurbulence type="fractalNoise" baseFrequency=".86" numOctaves="3" seed="9"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <clipPath id="nightClip">
      <circle cx="200" cy="200" r="168"/>
    </clipPath>
  </defs>
  <circle cx="200" cy="200" r="180" fill="#030407"/>
